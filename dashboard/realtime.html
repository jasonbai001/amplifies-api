<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplifies - Real-time AI Team Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(15, 15, 35, 0.95);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-indicator { display: flex; align-items: center; gap: 8px; }
        .pulse { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .container { max-width: 1400px; margin: 0 auto; padding: 100px 30px 30px; }
        
        /* Real-time Stats */
        .live-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .live-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .live-card:hover { border-color: rgba(0, 212, 255, 0.3); }
        .live-card .value { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .live-card .label { color: #8892b0; font-size: 0.9rem; margin-top: 5px; }
        .live-card .change { font-size: 0.8rem; margin-top: 5px; }
        .change.up { color: #00ff88; }
        .change.down { color: #ff6b6b; }
        
        /* Agent Grid */
        .section { margin-bottom: 40px; }
        .section-title { font-size: 1.3rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .agent-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .agent-card:hover { 
            border-color: rgba(0, 212, 255, 0.3); 
            transform: translateY(-2px);
        }
        .agent-card.active { border-left: 3px solid #00ff88; }
        .agent-card.busy { border-left: 3px solid #ffaa00; }
        .agent-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .agent-icon { font-size: 1.8rem; }
        .agent-info { flex: 1; }
        .agent-name { font-weight: 600; font-size: 0.95rem; }
        .agent-role { color: #8892b0; font-size: 0.8rem; }
        .agent-status { 
            display: inline-flex; 
            align-items: center; 
            gap: 4px;
            padding: 4px 10px; 
            border-radius: 12px; 
            font-size: 0.7rem; 
            font-weight: 600;
        }
        .status-active { background: rgba(0, 255, 136, 0.15); color: #00ff88; }
        .status-busy { background: rgba(255, 170, 0, 0.15); color: #ffaa00; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-active .status-dot { background: #00ff88; }
        .status-busy .status-dot { background: #ffaa00; }
        
        .agent-metrics { display: flex; gap: 15px; margin-top: 12px; font-size: 0.8rem; }
        .metric { display: flex; align-items: center; gap: 4px; color: #8892b0; }
        .metric-value { color: #fff; font-weight: 600; }
        
        /* Tasks */
        .tasks-list { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 20px; }
        .task-item { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .task-item:last-child { border-bottom: none; }
        .task-progress { width: 100px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; }
        .task-progress-bar { height: 100%; background: linear-gradient(90deg, #00d4ff, #00ff88); transition: width 0.5s; }
        
        /* Performance Chart */
        .chart-container { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 20px; height: 200px; position: relative; }
        .chart-line { position: absolute; bottom: 20px; left: 20px; right: 20px; height: 100px; }
        .chart-bar { 
            position: absolute; 
            bottom: 0; 
            width: 8px; 
            background: linear-gradient(180deg, #00d4ff, #667eea);
            border-radius: 4px 4px 0 0;
            transition: height 0.5s;
        }
        
        .refresh-info { text-align: center; color: #8892b0; font-size: 0.8rem; margin-top: 20px; }
        .last-update { color: #00d4ff; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🚀 Amplifies Dashboard</div>
        <div class="status-indicator">
            <div class="pulse"></div>
            <span style="color: #00ff88; font-size: 0.9rem;">Live</span>
        </div>
    </nav>
    
    <div class="container">
        <!-- Real-time Stats -->
        <div class="live-stats" id="liveStats">
            <div class="live-card">
                <div class="value" id="activeAgents">-</div>
                <div class="label">Active Agents</div>
                <div class="change up" id="agentsChange">+0 this minute</div>
            </div>
            <div class="live-card">
                <div class="value" id="tasksCompleted">-</div>
                <div class="label">Tasks Completed</div>
                <div class="change up" id="tasksChange">+0 this minute</div>
            </div>
            <div class="live-card">
                <div class="value" id="imagesGenerated">-</div>
                <div class="label">Images Generated</div>
                <div class="change up" id="imagesChange">+0 this hour</div>
            </div>
            <div class="live-card">
                <div class="value" id="avgResponse">-</div>
                <div class="label">Avg Response (ms)</div>
                <div class="change down" id="responseChange">-5% vs last</div>
            </div>
            <div class="live-card">
                <div class="value" id="systemUptime">-</div>
                <div class="label">Uptime</div>
                <div class="change up">99.9%</div>
            </div>
        </div>
        
        <!-- Active Tasks -->
        <div class="section">
            <h2 class="section-title">⚡ Active Tasks</h2>
            <div class="tasks-list" id="tasksList">
                <div class="task-item">
                    <span>Loading...</span>
                </div>
            </div>
        </div>
        
        <!-- AI Agents -->
        <div class="section">
            <h2 class="section-title">🤖 AI Team (26 Agents)</h2>
            <div class="agents-grid" id="agentsGrid">
                <!-- Agents will be populated by JS -->
            </div>
        </div>
        
        <!-- Performance -->
        <div class="section">
            <h2 class="section-title">📊 Performance (Real-time)</h2>
            <div class="chart-container">
                <div class="chart-line" id="performanceChart">
                    <!-- Bars will be populated by JS -->
                </div>
            </div>
        </div>
        
        <div class="refresh-info">
            Last updated: <span class="last-update" id="lastUpdate">-</span> | 
            Auto-refresh every 3 seconds
        </div>
    </div>
    
    <script>
        // API endpoint
        const API_URL = window.location.origin.includes('localhost') 
            ? 'http://localhost:3456' 
            : window.location.origin;
        
        let previousData = null;
        
        // Fetch real-time data
        async function fetchData() {
            try {
                const response = await fetch(`${API_URL}/api/realtime`);
                const data = await response.json();
                updateDashboard(data);
                previousData = data;
            } catch (error) {
                console.error('Failed to fetch data:', error);
            }
        }
        
        // Update dashboard
        function updateDashboard(data) {
            // Update stats
            document.getElementById('activeAgents').textContent = data.system.activeAgents;
            document.getElementById('tasksCompleted').textContent = data.metrics.totalTasksCompleted.toLocaleString();
            document.getElementById('imagesGenerated').textContent = data.metrics.imagesGenerated;
            document.getElementById('avgResponse').textContent = data.metrics.avgResponseTime;
            document.getElementById('systemUptime').textContent = formatUptime(data.uptime);
            
            // Calculate changes
            if (previousData) {
                const agentsChange = data.system.activeAgents - previousData.system.activeAgents;
                const tasksChange = data.metrics.totalTasksCompleted - previousData.metrics.totalTasksCompleted;
                
                updateChangeIndicator('agentsChange', agentsChange);
                updateChangeIndicator('tasksChange', tasksChange);
            }
            
            // Update tasks
            updateTasks(data.tasks);
            
            // Update agents
            updateAgents(data.agents);
            
            // Update chart
            updateChart(data.performance);
            
            // Update timestamp
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        function updateChangeIndicator(id, change) {
            const el = document.getElementById(id);
            if (change > 0) {
                el.textContent = `+${change} this minute`;
                el.className = 'change up';
            } else if (change < 0) {
                el.textContent = `${change} this minute`;
                el.className = 'change down';
            } else {
                el.textContent = 'No change';
                el.className = 'change';
            }
        }
        
        function updateTasks(tasks) {
            const container = document.getElementById('tasksList');
            container.innerHTML = tasks.map(task => `
                <div class="task-item">
                    <span style="flex: 1;">${task.name}</span>
                    <span style="color: #8892b0; font-size: 0.8rem;">${task.agent}</span>
                    <div class="task-progress">
                        <div class="task-progress-bar" style="width: ${task.progress}%"></div>
                    </div>
                    <span style="font-size: 0.8rem; color: ${task.status === 'completed' ? '#00ff88' : '#00d4ff'};">
                        ${task.status}
                    </span>
                </div>
            `).join('');
        }
        
        function updateAgents(agents) {
            const container = document.getElementById('agentsGrid');
            const agentList = Object.values(agents);
            
            container.innerHTML = agentList.map(agent => `
                <div class="agent-card ${agent.status}">
                    <div class="agent-header">
                        <div class="agent-icon">${agent.icon}</div>
                        <div class="agent-info">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.team} team</div>
                        </div>
                        <span class="agent-status status-${agent.status}">
                            <span class="status-dot"></span>
                            ${agent.status}
                        </span>
                    </div>
                    <div class="agent-metrics">
                        <div class="metric">
                            <span>Tasks:</span>
                            <span class="metric-value">${agent.tasksCompleted}</span>
                        </div>
                        <div class="metric">
                            <span>CPU:</span>
                            <span class="metric-value">${agent.cpu.toFixed(1)}%</span>
                        </div>
                        <div class="metric">
                            <span>MEM:</span>
                            <span class="metric-value">${agent.memory.toFixed(0)}MB</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function updateChart(performance) {
            const container = document.getElementById('performanceChart');
            const bars = 20;
            let html = '';
            
            for (let i = 0; i < bars; i++) {
                const height = Math.random() * 80 + 20;
                html += `<div class="chart-bar" style="left: ${i * 5}%; height: ${height}%;"></div>`;
            }
            
            container.innerHTML = html;
        }
        
        function formatUptime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            return `${hours}h ${minutes}m`;
        }
        
        // Initial load
        fetchData();
        
        // Auto-refresh every 3 seconds
        setInterval(fetchData, 3000);
    </script>
</body>
</html>
